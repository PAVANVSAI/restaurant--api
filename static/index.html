<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Finder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        header {
            background: #e23744;
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 { font-size: 22px; }

        #auth-section {
            display: flex;
            gap: 8px;
        }

        input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        #login-btn { background: white; color: #e23744; }
        #logout-btn { background: white; color: #e23744; display: none; }

        .container { max-width: 800px; margin: 32px auto; padding: 0 16px; }

        #add-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 24px;
            display: none;
            gap: 12px;
            flex-wrap: wrap;
        }

        #add-section input { flex: 1; min-width: 150px; }
        #add-btn { background: #e23744; color: white; }

        .restaurant-card {
            background: white;
            padding: 16px 20px;
            border-radius: 10px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .restaurant-name { font-size: 17px; font-weight: 600; }

        .restaurant-rating {
            background: #48c774;
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 700;
        }

        .delete-btn {
            background: #ff3860;
            color: white;
            padding: 6px 12px;
            display: none;
            margin-left: 10px;
        }

        #status {
            text-align: center;
            padding: 12px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    <h1>🍽️ Restaurant Finder</h1>
    <div id="auth-section">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="signup-btn" onclick="signup()">Signup</button>
        <button id="login-btn" onclick="login()">Login</button>
        <button id="logout-btn" onclick="logout()">Logout</button>
    </div>
</header>

<div class="container">

    <div id="add-section">
        <input type="text" id="new-name" placeholder="Restaurant name">
        <input type="number" id="new-rating" placeholder="Rating (1-5)" min="1" max="5" step="0.1">
        <button id="add-btn" onclick="addRestaurant()">+ Add</button>
    </div>

    <div id="status">Loading restaurants...</div>
    <div id="restaurants-list"></div>

</div>

<script>
    // your live API URL
    const API = "https://restaurant-api-06jo.onrender.com";
    let token = localStorage.getItem("token") || null;

    // run when page loads
    window.onload = () => {
        updateUI();
        fetchRestaurants();
    }

    // fetch and display all restaurants
    async function fetchRestaurants() {
        document.getElementById("status").innerText = "Loading...";
        const res = await fetch(`${API}/restaurants`);
        const data = await res.json();
        const list = document.getElementById("restaurants-list");
        list.innerHTML = "";

        if (data.restaurants.length === 0) {
            document.getElementById("status").innerText = "No restaurants yet.";
            return;
        }

        document.getElementById("status").innerText = "";
        data.restaurants.forEach(r => {
            list.innerHTML += `
                <div class="restaurant-card">
                    <div>
                        <div class="restaurant-name">${r.name}</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:10px">
                        <span class="restaurant-rating">⭐ ${r.rating}</span>
                        <button class="delete-btn" id="del-${r.id}"
                            onclick="deleteRestaurant(${r.id})"
                            style="display:${token ? 'block' : 'none'}">
                            Delete
                        </button>
                    </div>
                </div>`;
        });
    }

    // signup
    async function signup() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const res = await fetch(`${API}/signup`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({email, password})
        });
        const data = await res.json();
        alert(data.message || data.detail);
    }

    // login
    async function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const res = await fetch(`${API}/login`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({email, password})
        });
        const data = await res.json();
        if (data.token) {
            token = data.token;
            localStorage.setItem("token", token);
            updateUI();
            fetchRestaurants();
            alert("Logged in!");
        } else {
            alert(data.detail);
        }
    }

    // logout
    function logout() {
        token = null;
        localStorage.removeItem("token");
        updateUI();
        fetchRestaurants();
    }

    // add restaurant
    async function addRestaurant() {
        const name = document.getElementById("new-name").value;
        const rating = parseFloat(document.getElementById("new-rating").value);
        const res = await fetch(`${API}/restaurants`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify({name, rating})
        });
        const data = await res.json();
        alert(data.message || data.detail);
        fetchRestaurants();
    }

    // delete restaurant
    async function deleteRestaurant(id) {
        const res = await fetch(`${API}/restaurants/${id}`, {
            method: "DELETE",
            headers: {"Authorization": `Bearer ${token}`}
        });
        const data = await res.json();
        alert(data.message);
        fetchRestaurants();
    }

    // show/hide UI based on login state
    function updateUI() {
        const loggedIn = token !== null;
        document.getElementById("add-section").style.display = loggedIn ? "flex" : "none";
        document.getElementById("login-btn").style.display = loggedIn ? "none" : "block";
        document.getElementById("signup-btn").style.display = loggedIn ? "none" : "block";
        document.getElementById("logout-btn").style.display = loggedIn ? "block" : "none";
    }
</script>

</body>
</html>
